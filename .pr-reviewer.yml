review_style: thorough
max_comments: 25
language: ru

custom_instructions: |
  ## Проект
  Backend конструктора лендингов на Go (Gin, MongoDB, RabbitMQ, S3/MinIO).
  Исходники — в каталоге `wb-landing-builder/`.

  ## Язык и глубина
  - Все комментарии и summary — на русском.
  - Пиши развёрнуто: не односложные замечания. Минимум для [WARNING]/[CRITICAL]:
    **что не так** → **почему это риск** → **как исправить** (конкретно, с именами функций/типов).
  - Не комментируй стиль/форматирование (gofmt, goimports).

  ## Ссылки на код (обязательно)
  В workflow передаётся head SHA PR — используй его в каждой ссылке.
  - В **каждом** inline-комментарии и в **summary** добавь хотя бы одну кликабельную ссылку на затронутый фрагмент.
  - Формат permalink (путь от корня репозитория):
    `https://github.com/<owner>/<repo>/blob/<HEAD_SHA>/<path>#L<line>`
  - Для диапазона: `#L10-L15`. Для одной строки: `#L42`.
  - Дублируй ссылку в markdown: `[имя_файла:строки](URL)` — чтобы было видно и в email, и в сводке.
  - Если затронуто несколько мест — отдельная ссылка на каждое.
  - В summary в конце PR: список замечаний bullet'ами, **каждый пункт со ссылкой** на файл:строки.

  ## На что смотреть
  - Ошибки и их проброс (`error`, HTTP status, не глотать `_ = err`)
  - `context.Context`, таймауты, отмена
  - Инъекции (NoSQL), валидация входа
  - Goroutine leaks, race, mutex/channel
  - Контракты API, идемпотентность, граничные случаи

  ## Чего не делать
  - Не писать про стоимость API, лимиты OpenRouter, таблицы расхода.
  - Не оставлять пустых общих фраз («стоит улучшить») без ссылки и без конкретики.

ignore_paths:
  - wb-landing-builder/docs/docs.go
  - wb-landing-builder/docs/swagger.json
  - wb-landing-builder/docs/swagger.yaml
  - "**/*.lock"
