services:
  draft-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      - MONGO_URI=mongodb://mongo:27017/?replicaSet=rs0
      - GRPC_PORT=50051
      - DEV_MODE=true
    depends_on:
      - mongo
    networks:
      - app-network

networks:
  app-network:
    driver: bridge