proxy_cache_path /var/cache/nginx/publications levels=1:2 keys_zone=pub_cache:10m max_size=1g inactive=60m;

server {
    listen 80;

    # API — в backend
    location /api/ {
        proxy_pass http://wb-landing-builder:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger — в backend
    location /swagger/ {
        proxy_pass http://wb-landing-builder:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Публичная отдача лендингов из MinIO с кэшем (CDN-слой)
    location /publications/ {
        # bucket=publications, объекты лежат как publications/{id}/...
        proxy_pass http://minio:9000/publications/publications/;
        proxy_set_header Host $host;

        proxy_cache pub_cache;
        proxy_cache_key $request_uri;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 30s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Статические файлы UI (фронтенд)
    location / {
        root /usr/share/nginx/static;
        try_files $uri =404;
    }
}
