services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: wb-app

    ports:
      - "8080:8080"

    volumes:
      - .:/app

    depends_on:
      - mongo

    networks:
      - app-network

  mongo:
    image: mongo:7

    container_name: wb-mongo

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin

    volumes:
      - mongodata:/data/db

    networks:
      - app-network

  mongo-express:
    image: mongo-express

    container_name: wb-mongo-express

    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/

    depends_on:
      - mongo

    networks:
      - app-network

volumes:
  mongodata:

networks:
  app-network: