services:
  mongo:
    image: mongo:7
    container_name: landing-mongo
    restart: always
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 5s
      timeout: 30s
      retries: 20
      start_period: 20s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"
    entrypoint: >
      bash -c '
        echo "Waiting for MongoDB to be ready..."
        until mongosh --host mongo:27017 --quiet --eval "db.adminCommand({ ping: 1 }).ok" | grep 1; do
          sleep 1
        done
        echo "MongoDB is ready. Initializing replica set..."
        mongosh --host mongo:27017 --quiet --eval "
          try {
            const status = rs.status();
            print(\"Replica set already initialized: \" + status.set);
          } catch (e) {
            print(\"Initializing replica set...\");
            rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] });
            print(\"Replica set initialized successfully\");
          }
        "
        echo "Creating admin user..."
        mongosh --host mongo:27017 --quiet --eval "
          db = db.getSiblingDB(\"admin\");
          if (!db.getUser(\"admin\")) {
            db.createUser({
              user: \"admin\",
              pwd: \"admin\",
              roles: [{ role: \"root\", db: \"admin\" }]
            });
            print(\"Admin user created successfully\");
          } else {
            print(\"Admin user already exists\");
          }
        "
        echo "MongoDB initialization complete!"
      '

  mongo-express:
    image: mongo-express:latest
    container_name: landing-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/?replicaSet=rs0&authSource=admin
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: landing-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 2; done &&
        mc mb -p local/publications || true
      "

  wb-landing-builder:
    build: .
    image: wb-landing-builder:latest
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - READ_TIMEOUT=10s
      - WRITE_TIMEOUT=10s
      - RATE_LIMIT=100
      - API_SECRET=stub
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_USER=admin
      - MONGO_PASSWORD=admin
      - MONGO_DATABASE=storage
      - MONGO_MAX_CONNECTIONS=100
      - MONGO_TTL_DAYS=30
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=publications
      - S3_USE_PATH_STYLE=true
      - PUBLISHING_CLI_PATH=/app/cli/generate.py
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/swagger/doc.json >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodata:
    driver: local
  miniodata:
    driver: local

networks:
  app-network:
    driver: bridge