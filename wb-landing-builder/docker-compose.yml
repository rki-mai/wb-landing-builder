services:
  mongo:
    build:
      context: ./docker/mongo
    image: landing-mongo:local
    container_name: landing-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/mongo-healthcheck.sh"]
      interval: 5s
      timeout: 30s
      retries: 20
      start_period: 30s

  mongo-express:
    image: mongo-express:latest
    container_name: landing-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/?replicaSet=rs0&authSource=admin
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    build:
      context: ./docker/minio
    image: landing-minio:local
    container_name: landing-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKET: publications
    volumes:
      - miniodata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/minio-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: landing-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  wb-landing-builder:
    build: .
    image: wb-landing-builder:latest
    container_name: landing-builder
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - READ_TIMEOUT=10s
      - WRITE_TIMEOUT=10s
      - RATE_LIMIT=100
      - API_SECRET=stub
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_USER=admin
      - MONGO_PASSWORD=admin
      - MONGO_DATABASE=storage
      - MONGO_MAX_CONNECTIONS=100
      - MONGO_TTL_DAYS=30
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=publications
      - S3_USE_PATH_STYLE=true
      - PUBLISHING_CLI_PATH=/app/cli/generate.py
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_PUBLISH_QUEUE=publish.requests
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/swagger/doc.json >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodata:
    driver: local
  miniodata:
    driver: local

networks:
  app-network:
    driver: bridge
