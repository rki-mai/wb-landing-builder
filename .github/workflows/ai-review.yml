# AI-ревью PR по запросу: напишите /review в комментарии к PR.
# Провайдер: OpenRouter — https://openrouter.ai/keys
# Org secret: OPENROUTER_API_KEY
# Промпт и стиль: .pr-reviewer.yml
name: AI Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR head commit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            // SHA, а не имя ветки: после merge ветку часто удаляют — checkout по ref тогда падает
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: AI review
        id: ai_review
        uses: mara-werils/ai-code-reviewer@v1
        with:
          provider: openai
          model: openrouter/free
          api_base_url: https://openrouter.ai/api/v1
          suggest_tests: 'false'
          auto_summarize: 'true'
          custom_instructions: |
            Ссылки на код для этого PR (обязательно использовать в комментариях и summary):
            - Репозиторий: ${{ github.repository }}
            - Head SHA: ${{ steps.pr.outputs.head_sha }}
            - Шаблон: https://github.com/${{ github.repository }}/blob/${{ steps.pr.outputs.head_sha }}/<path>#L<line>
            - Пример: https://github.com/${{ github.repository }}/blob/${{ steps.pr.outputs.head_sha }}/wb-landing-builder/cmd/main.go#L10-L20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: React success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
